---
services:
  db:
    image: mysql:lts
    container_name: wordpress-db
    volumes:
      - wordpressdb:/var/lib/mysql
      - ./mysql:/docker-entrypoint-initdb.d
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: $MYSQL_ROOT_PASSWORD
      #MYSQL_DATABASE: real_estate_business
      MYSQL_USER: $MYSQL_USER
      MYSQL_PASSWORD: $MYSQL_PASSWORD
    networks:
      - wordpress-network

  real-estate-business:
    build:
      context: ./php
    depends_on:
      - db
    container_name: wordpress-real-estate-business
    working_dir: /var/www/real-estate-business
    user: "1000:1000"
    env_file: .env
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: $MYSQL_USER
      WORDPRESS_DB_PASSWORD: $MYSQL_PASSWORD
      WORDPRESS_DB_NAME: real_estate_business
    volumes:
      - ../real-estate-business:/var/www/real-estate-business
      - ../real-estate-business-sage:/var/www/real-estate-business/wp-content/themes/real-estate-business-sage
    networks:
      - wordpress-network

  # Template for adding another WordPress site to this stack.
  # Copy/uncomment, rename "example-site" throughout, and add a matching
  # nginx server block (see nginx/config/example-site.conf.example).
  # example-site:
  #   build:
  #     context: ./php
  #   depends_on:
  #     - db
  #   container_name: wordpress-example-site
  #   working_dir: /var/www/example-site
  #   env_file: .env
  #   environment:
  #     WORDPRESS_DB_HOST: db
  #     WORDPRESS_DB_USER: $MYSQL_USER
  #     WORDPRESS_DB_PASSWORD: $MYSQL_PASSWORD
  #     WORDPRESS_DB_NAME: example_site
  #   volumes:
  #     - example-site:/var/www/example-site
  #     - ./imports/example-site:/var/www/example-site/imports
  #   networks:
  #     - wordpress-network

  web:
    depends_on:
      - real-estate-business
      # - example-site
    image: nginx:alpine
    container_name: wordpress-nginx
    volumes:
      - ${NGINX_HOST_LOG_PATH}:/var/log/nginx
      - ./nginx/config:/etc/nginx/conf.d
      - ../real-estate-business:/var/www/real-estate-business
      - ../real-estate-business-sage:/var/www/real-estate-business/wp-content/themes/real-estate-business-sage
      # - example-site:/var/www/example-site
    ports:
      - 8000:80 # real-estate-business
      # - 8001:81 # example-site
    networks:
      - wordpress-network

  pma:
    image: phpmyadmin/phpmyadmin
    container_name: wordpress-pma
    environment:
      - PMA_ARBITRARY=1
      - PMA_HOST=${PMA_HOST}
      - PMA_USER=${PMA_USER}
      - PMA_PASSWORD=${PMA_PASSWORD}
      - PMA_PORT=${PMA_PORT}
      - UPLOAD_LIMIT=200M
    depends_on:
      - db
    ports:
      - 8888:80
    networks:
      - wordpress-network

networks:
  wordpress-network:
    driver: bridge

volumes:
  # example-site:
  wordpressdb:
    driver: local
